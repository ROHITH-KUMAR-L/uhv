<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScamShield — AI-Powered Scam Detection & Awareness</title>
  <meta name="description" content="Protect yourself from online scams with AI-powered detection, interactive quizzes, and realistic simulations.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- ═══════ NAVBAR ═══════ -->
  <nav id="navbar" class="navbar">
    <div class="nav-container">
      <a href="#/" class="nav-logo">
        <span class="logo-icon">🛡️</span>
        <span class="logo-text">Scam<span class="logo-highlight">Shield</span></span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="#/" class="nav-link" data-page="landing">Home</a>
        <a href="#/quiz" class="nav-link" data-page="quiz">Quiz</a>
        <a href="#/simulate" class="nav-link" data-page="simulate">Simulations</a>
      </div>
      <div class="nav-actions">
        <div id="navAuth" class="nav-auth">
          <a href="#/login" class="btn btn-outline btn-sm" id="loginBtn">Login</a>
        </div>
        <div id="navUser" class="nav-user hidden">
          <a href="#/dashboard" class="btn btn-ghost btn-sm">Dashboard</a>
          <button class="btn btn-outline btn-sm" id="logoutBtn">Logout</button>
        </div>
        <button class="nav-toggle" id="navToggle" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ═══════ MAIN CONTENT ═══════ -->
  <main id="app"></main>

  <!-- ═══════ TOAST CONTAINER ═══════ -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PAGE TEMPLATES                              -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- ── LANDING ── -->
  <template id="tpl-landing">
    <section class="landing">
      <!-- Hero -->
      <div class="hero">
        <div class="hero-bg-grid"></div>
        <div class="hero-content">
          <div class="hero-badge">🔒 AI-Powered Protection</div>
          <h1 class="hero-title">Stay Safe in the <span class="gradient-text">Digital World</span></h1>
          <p class="hero-sub" id="heroTyping"></p>
          <div class="hero-cta">
            <a href="#/quiz" class="btn btn-primary btn-lg">Take the Quiz</a>
            <a href="#/simulate" class="btn btn-outline btn-lg">Try Simulations</a>
          </div>
        </div>
        <div class="hero-visual">
          <div class="shield-anim">
            <div class="shield-ring ring-1"></div>
            <div class="shield-ring ring-2"></div>
            <div class="shield-ring ring-3"></div>
            <div class="shield-core">🛡️</div>
          </div>
        </div>
      </div>


      <!-- Features -->
      <div class="section" id="features">
        <h2 class="section-title">Why <span class="gradient-text">ScamShield</span>?</h2>
        <p class="section-sub">Comprehensive cybersecurity awareness in one platform</p>
        <div class="features-grid">
          <div class="feature-card" data-delay="0">
            <div class="feature-icon">🔍</div>
            <h3>AI Detection</h3>
            <p>Scan text, URLs, and files with Gemini AI + VirusTotal intelligence</p>
          </div>
          <div class="feature-card" data-delay="100">
            <div class="feature-icon">🎯</div>
            <h3>Interactive Quiz</h3>
            <p>Test your scam detection skills with real-world scenarios</p>
          </div>
          <div class="feature-card" data-delay="200">
            <div class="feature-icon">🎭</div>
            <h3>Scam Simulations</h3>
            <p>Experience realistic scam attempts in a safe environment</p>
          </div>
          <div class="feature-card" data-delay="300">
            <div class="feature-icon">📊</div>
            <h3>Track Progress</h3>
            <p>Monitor your cyber safety score and compete on leaderboards</p>
          </div>
          <div class="feature-card" data-delay="400">
            <div class="feature-icon">📚</div>
            <h3>Learn & Grow</h3>
            <p>Educational content on the latest scam tactics and how to avoid them</p>
          </div>
          <div class="feature-card" data-delay="500">
            <div class="feature-icon">🤝</div>
            <h3>Community</h3>
            <p>Report scams and help others stay safe in a trusted community</p>
          </div>
        </div>
      </div>

      <!-- How It Works -->
      <div class="section">
        <h2 class="section-title">How It <span class="gradient-text">Works</span></h2>
        <div class="steps">
          <div class="step"><div class="step-num">1</div><h3>Learn</h3><p>Explore awareness modules about common scam types</p></div>
          <div class="step-line"></div>
          <div class="step"><div class="step-num">2</div><h3>Practice</h3><p>Test your skills with quizzes and realistic simulations</p></div>
          <div class="step-line"></div>
          <div class="step"><div class="step-num">3</div><h3>Protect</h3><p>Use AI-powered detection to scan suspicious content</p></div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <div class="footer-content">
          <div class="footer-brand">
            <span class="logo-icon">🛡️</span>
            <span class="logo-text">Scam<span class="logo-highlight">Shield</span></span>
            <p>AI-Powered Scam Detection & Awareness Platform</p>
          </div>
          <p class="footer-copy">&copy; 2026 ScamShield. Built for a safer digital future.</p>
        </div>
      </footer>
    </section>
  </template>

  <!-- ── AUTH ── -->
  <template id="tpl-login">
    <section class="auth-page">
      <div class="auth-card glass-card">
        <div class="auth-header">
          <span class="logo-icon" style="font-size:2.5rem">🛡️</span>
          <h1>Welcome to <span class="gradient-text">ScamShield</span></h1>
          <p>Sign in to track your progress</p>
        </div>
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="email">Email</button>
          <button class="auth-tab" data-tab="phone">Phone</button>
        </div>
        <!-- Email Flow -->
        <form id="emailForm" class="auth-form">
          <div class="form-group">
            <label for="authEmail">Email Address</label>
            <input type="email" id="authEmail" placeholder="you@example.com" required>
          </div>
          <div class="form-group hidden" id="emailCodeGroup">
            <label for="authEmailCode">Verification Code</label>
            <input type="text" id="authEmailCode" placeholder="6-digit code" maxlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="emailSubmitBtn">Send Code</button>
        </form>
        <!-- Phone Flow -->
        <form id="phoneForm" class="auth-form hidden">
          <div class="form-group">
            <label for="authPhone">Phone Number</label>
            <input type="tel" id="authPhone" placeholder="+91XXXXXXXXXX" required>
          </div>
          <div class="form-group hidden" id="otpCodeGroup">
            <label for="authOTP">OTP Code</label>
            <input type="text" id="authOTP" placeholder="6-digit OTP" maxlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="phoneSubmitBtn">Send OTP</button>
        </form>
        <div class="auth-divider"><span>or</span></div>
        <button class="btn btn-google btn-full" id="googleLoginBtn">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
          Continue with Google
        </button>
      </div>
    </section>
  </template>

  <!-- ── DASHBOARD ── -->
  <template id="tpl-dashboard">
    <section class="dashboard">
      <div class="dash-header">
        <div>
          <h1>Welcome back, <span class="gradient-text" id="dashName">User</span></h1>
          <p class="text-muted">Your cybersecurity command center</p>
        </div>
      </div>
      <div class="dash-stats">
        <div class="dash-stat-card">
          <div class="dash-stat-icon" style="color:var(--accent-cyan)">🔍</div>
          <div class="dash-stat-val" id="dashScans">0</div>
          <div class="dash-stat-lbl">Scans Run</div>
        </div>
        <div class="dash-stat-card">
          <div class="dash-stat-icon" style="color:var(--accent-purple)">🎯</div>
          <div class="dash-stat-val" id="dashQuizScore">0</div>
          <div class="dash-stat-lbl">Quiz Score</div>
        </div>
        <div class="dash-stat-card">
          <div class="dash-stat-icon" style="color:var(--accent-green)">🛡️</div>
          <div class="dash-stat-val" id="dashSafety">0</div>
          <div class="dash-stat-lbl">Safety Score</div>
        </div>
        <div class="dash-stat-card">
          <div class="dash-stat-icon" style="color:var(--accent-amber)">📋</div>
          <div class="dash-stat-val" id="dashReports">0</div>
          <div class="dash-stat-lbl">Reports Filed</div>
        </div>
      </div>

      <!-- Quick Scan -->
      <div class="dash-section">
        <h2>Quick Scan</h2>
        <div class="scan-box glass-card">
          <textarea id="scanInput" placeholder="Paste suspicious text, URL, or message here..." rows="3"></textarea>
          <button class="btn btn-primary" id="scanBtn">🔍 Analyze</button>
        </div>
        <div id="scanResult" class="scan-result hidden"></div>
      </div>

      <!-- Quick Actions -->
      <div class="dash-section">
        <h2>Quick Actions</h2>
        <div class="quick-actions">
          <a href="#/quiz" class="action-card"><span>🎯</span>Take Quiz</a>
          <a href="#/simulate" class="action-card"><span>🎭</span>Simulations</a>

        </div>
      </div>
    </section>
  </template>

  <!-- ── QUIZ ── -->
  <template id="tpl-quiz">
    <section class="quiz-page">
      <!-- Difficulty Picker -->
      <div id="quizPicker" class="quiz-picker">
        <h1 class="section-title">Cyber Awareness <span class="gradient-text">Quiz</span></h1>
        <p class="section-sub">Test your ability to spot online scams</p>
        <div class="difficulty-grid">
          <button class="diff-card" data-diff="easy">
            <span class="diff-icon">🟢</span>
            <h3>Easy</h3>
            <p>Basic scam awareness</p>
          </button>
          <button class="diff-card" data-diff="medium">
            <span class="diff-icon">🟡</span>
            <h3>Medium</h3>
            <p>Intermediate challenges</p>
          </button>
          <button class="diff-card" data-diff="hard">
            <span class="diff-icon">🔴</span>
            <h3>Hard</h3>
            <p>Expert-level scenarios</p>
          </button>
        </div>
      </div>
      <!-- Quiz Interface -->
      <div id="quizInterface" class="quiz-interface hidden">
        <div class="quiz-header">
          <div class="quiz-progress"><div class="quiz-progress-bar" id="quizProgressBar"></div></div>
          <div class="quiz-meta">
            <span id="quizCounter">1 / 10</span>
            <span class="quiz-timer" id="quizTimer">⏱ 30s</span>
          </div>
        </div>
        <div class="quiz-body glass-card">
          <p class="quiz-scenario" id="quizScenario"></p>
          <div class="quiz-options">
            <button class="quiz-opt" id="optA" data-opt="a"><span class="opt-label">A</span><span class="opt-text" id="optAText"></span></button>
            <button class="quiz-opt" id="optB" data-opt="b"><span class="opt-label">B</span><span class="opt-text" id="optBText"></span></button>
          </div>
          <div class="quiz-feedback hidden" id="quizFeedback"></div>
        </div>
      </div>
      <!-- Quiz Result -->
      <div id="quizResult" class="quiz-result hidden">
        <div class="result-card glass-card">
          <div class="result-icon" id="resultIcon">🏆</div>
          <h2 id="resultTitle">Great Job!</h2>
          <div class="result-score">
            <span class="result-num" id="resultScore">0</span><span class="result-pct">%</span>
          </div>
          <p id="resultMsg">You scored 8 out of 10</p>
          <div class="result-actions">
            <button class="btn btn-primary" id="retryQuiz">Try Again</button>
          </div>
        </div>
      </div>
    </section>
  </template>

  <!-- ── SIMULATIONS ── -->
  <template id="tpl-simulate">
    <section class="sim-page">
      <!-- Sim Selector -->
      <div id="simPicker">
        <h1 class="section-title">Scam <span class="gradient-text">Simulations</span></h1>
        <p class="section-sub">Experience realistic scam attempts in a safe environment. Can you spot the red flags?</p>
        <div class="sim-grid">
          <button class="sim-card" data-sim="phishing">
            <div class="sim-card-icon">📧</div>
            <h3>Phishing Email</h3>
            <p>Identify suspicious emails</p>
          </button>
          <button class="sim-card" data-sim="banking">
            <div class="sim-card-icon">🏦</div>
            <h3>Fake Banking</h3>
            <p>Spot fake login pages</p>
          </button>
          <button class="sim-card" data-sim="otp">
            <div class="sim-card-icon">💬</div>
            <h3>OTP Scam</h3>
            <p>Handle suspicious OTP requests</p>
          </button>
          <button class="sim-card" data-sim="social">
            <div class="sim-card-icon">📱</div>
            <h3>Social Media</h3>
            <p>Detect fake messages & offers</p>
          </button>
        </div>
      </div>
      <!-- Sim Container -->
      <div id="simContainer" class="sim-container hidden"></div>
    </section>
  </template>



  <!-- ═══════ SCRIPTS ═══════ -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/landing.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/simulation.js"></script>

  <script src="js/app.js"></script>
</body>
</html>
